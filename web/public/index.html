<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲行动 - 子弹价格与预测</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <header class="topbar">
        <div class="container topbar__inner">
            <div class="brand">
                <div class="brand__logo">Delta Force</div>
                <div class="brand__title">子弹价格与 TimeXer 预测</div>
            </div>
            <nav class="nav" aria-label="导航">
                <a href="/" aria-current="page">概览</a>
                <a href="/trade-plan.html">倒卖计划</a>
                <a href="/thesis/项目总体架构图.html">项目架构</a>
            </nav>
            <div class="actions">
                <button class="btn btn--ghost" id="themeToggle" type="button" title="切换亮/暗主题">🌙</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="grid grid--stack">
            <section class="card">
                <div class="card__header">
                    <div class="card__title">筛选</div>
                    <div class="card__subtitle" id="metaBadge"></div>
                </div>
                <div class="card__body">
                    <div class="row row--wide">
                        <div class="field">
                            <label for="categorySelect">口径 / 类别</label>
                            <select id="categorySelect"></select>
                        </div>
                        <div class="field">
                            <label for="bulletSelect">子弹</label>
                            <select id="bulletSelect"></select>
                        </div>
                        <div class="field">
                            <label for="rangeSelect">历史范围</label>
                            <select id="rangeSelect">
                                <option value="all">全部</option>
                                <option value="3d">近 3 天</option>
                                <option value="7d">近 7 天</option>
                                <option value="30d">近 30 天</option>
                            </select>
                        </div>
                        <div>
                            <button class="btn" id="refreshBtn">加载</button>
                        </div>
                    </div>

                    <div class="kpis">
                        <div class="kpi">
                            <div class="kpi__label">最新均价</div>
                            <div class="kpi__value" id="kpiLatest">—</div>
                            <div class="kpi__hint" id="kpiLatestAt">—</div>
                        </div>
                        <div class="kpi">
                            <div class="kpi__label">24h 变化</div>
                            <div class="kpi__value" id="kpiDelta">—</div>
                            <div class="kpi__hint" id="kpiDeltaHint">—</div>
                        </div>
                        <div class="kpi">
                            <div class="kpi__label">样本点数</div>
                            <div class="kpi__value" id="kpiCount">—</div>
                            <div class="kpi__hint" id="kpiForecast">—</div>
                        </div>
                    </div>

                    <div class="status" id="status"></div>
                </div>
            </section>

            <section class="card">
                <div class="card__header">
                    <div class="card__title">走势</div>
                    <div class="badge" id="chartBadge"><i></i><span>历史 / 预测</span></div>
                </div>
                <div class="chart-wrap">
                    <canvas id="priceChart"></canvas>
                </div>
            </section>
        </div>
    </main>

    <script>
        const metaBadge = document.getElementById('metaBadge');
        const kpiLatest = document.getElementById('kpiLatest');
        const kpiLatestAt = document.getElementById('kpiLatestAt');
        const kpiDelta = document.getElementById('kpiDelta');
        const kpiDeltaHint = document.getElementById('kpiDeltaHint');
        const kpiCount = document.getElementById('kpiCount');
        const kpiForecast = document.getElementById('kpiForecast');

        const categorySelect = document.getElementById('categorySelect');
        const bulletSelect = document.getElementById('bulletSelect');
        const rangeSelect = document.getElementById('rangeSelect');
        const refreshBtn = document.getElementById('refreshBtn');
        const statusEl = document.getElementById('status');

        const blockedCategories = new Set(['7.62_39mm']);
        function isBlockedBulletName(name) {
            return /^7\.62_39mm\b/.test(String(name || ''));
        }

        function pad2(n) {
            return String(n).padStart(2, '0');
        }
        function formatTs(ts) {
            const d = new Date(ts);
            return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth() + 1)}-${pad2(d.getUTCDate())} ${pad2(d.getUTCHours())}:${pad2(d.getUTCMinutes())}`;
        }
        function setStatus(text) {
            const t = text || '';
            statusEl.textContent = t;
            statusEl.title = t;
        }

        function themeTokens() {
            const s = getComputedStyle(document.documentElement);
            const fg = s.getPropertyValue('--app-fg').trim() || 'rgba(255,255,255,0.92)';
            const muted = s.getPropertyValue('--app-muted').trim() || 'rgba(255,255,255,0.62)';
            const faint = s.getPropertyValue('--app-faint').trim() || 'rgba(255,255,255,0.36)';
            const accent = s.getPropertyValue('--app-accent').trim() || '#6ef1ff';
            const accent2 = s.getPropertyValue('--app-accent-2').trim() || '#ffcc66';
            const danger = s.getPropertyValue('--app-danger').trim() || '#ff4d6d';
            const border = s.getPropertyValue('--app-border').trim() || 'rgba(255,255,255,0.10)';
            return { fg, muted, faint, accent, accent2, danger, border };
        }

        function hexToRgba(hex, alpha) {
            const h = (hex || '').trim();
            if (!/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(h)) return `rgba(110, 241, 255, ${alpha})`;
            const full = h.length === 4 ? `#${h[1]}${h[1]}${h[2]}${h[2]}${h[3]}${h[3]}` : h;
            const r = parseInt(full.slice(1, 3), 16);
            const g = parseInt(full.slice(3, 5), 16);
            const b = parseInt(full.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function loadScript(url, { timeoutMs = 10_000 } = {}) {
            return new Promise((resolve, reject) => {
                const el = document.createElement('script');
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    el.remove();
                    reject(new Error('加载超时'));
                }, timeoutMs);
                el.src = url;
                el.async = true;
                el.onload = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    resolve();
                };
                el.onerror = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    el.remove();
                    reject(new Error('加载失败'));
                };
                document.head.appendChild(el);
            });
        }

        let chart = null;
        let chartReady = null;
        function ensureChart() {
            if (chart) return chart;
            const ctx = document.getElementById('priceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: themeTokens().muted,
                                boxWidth: 10,
                                boxHeight: 10,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(0,0,0,0.75)',
                            titleColor: 'rgba(255,255,255,0.92)',
                            bodyColor: 'rgba(255,255,255,0.86)',
                            borderColor: themeTokens().border,
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            ticks: { maxTicksLimit: 12, color: themeTokens().faint },
                            grid: { color: hexToRgba(themeTokens().accent, 0.08) }
                        },
                        y: {
                            beginAtZero: false,
                            ticks: { color: themeTokens().faint },
                            grid: { color: hexToRgba(themeTokens().accent, 0.08) }
                        }
                    }
                }
            });
            return chart;
        }
        async function ensureChartLib() {
            if (window.Chart) return;
            if (!chartReady) {
                chartReady = loadScript('/vendor/chart.js', { timeoutMs: 10_000 }).catch((e) => {
                    chartReady = null;
                    throw e;
                });
            }
            await chartReady;
            if (!window.Chart) throw new Error('Chart.js 未就绪');
        }

        function applyChartTheme() {
            if (!chart) return;
            const t = themeTokens();
            chart.options.plugins.legend.labels.color = t.muted;
            chart.options.plugins.tooltip.borderColor = t.border;
            chart.options.scales.x.ticks.color = t.faint;
            chart.options.scales.y.ticks.color = t.faint;
            chart.options.scales.x.grid.color = hexToRgba(t.accent, 0.08);
            chart.options.scales.y.grid.color = hexToRgba(t.accent, 0.08);
            chart.update('none');
        }

        async function fetchJson(url) {
            const resp = await fetch(url);
            const data = await resp.json();
            if (!resp.ok) throw new Error(data && data.error ? data.error : '请求失败');
            return data;
        }

        async function loadCategories() {
            const data = await fetchJson('/api/categories');
            categorySelect.innerHTML = '';
            const categories = (data.categories || []).filter(c => !blockedCategories.has(c));
            for (const c of categories) {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                categorySelect.appendChild(opt);
            }
        }

        async function loadBullets(category) {
            const data = await fetchJson(`/api/bullets?category=${encodeURIComponent(category)}`);
            bulletSelect.innerHTML = '';
            const bullets = (data.bullets || []).filter(b => !isBlockedBulletName(b));
            for (const b of bullets) {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = b;
                bulletSelect.appendChild(opt);
            }
        }

        function setChart(historyPoints, forecastPoints) {
            const c = ensureChart();
            const historyLabels = historyPoints.map(p => formatTs(p.ts));
            const historyValues = historyPoints.map(p => p.price);
            const forecastLabels = forecastPoints.map(p => formatTs(p.ts));
            const forecastValues = forecastPoints.map(p => p.price);

            const hasForecast = forecastPoints.length > 0;
            const labels = hasForecast ? historyLabels.concat(forecastLabels) : historyLabels;
            const histData = hasForecast ? historyValues.concat(Array(forecastValues.length).fill(null)) : historyValues;

            c.data.labels = labels;
            const t = themeTokens();
            const datasets = [
                {
                    label: '历史均价',
                    data: histData,
                    borderColor: hexToRgba(t.accent2, 0.92),
                    backgroundColor: hexToRgba(t.accent2, 0.12),
                    pointRadius: 0,
                    tension: 0.2
                }
            ];
            if (hasForecast) {
                const predData = Array(historyValues.length).fill(null).concat(forecastValues);
                datasets.push({
                    label: 'TimeXer 预测',
                    data: predData,
                    borderColor: hexToRgba(t.accent, 0.95),
                    backgroundColor: hexToRgba(t.accent, 0.10),
                    borderDash: [6, 4],
                    pointRadius: 0,
                    tension: 0.2
                });
            }
            c.data.datasets = datasets;
            c.update();
        }

        function formatNumber(n) {
            if (n == null || !Number.isFinite(n)) return '—';
            return n.toLocaleString('zh-CN', { maximumFractionDigits: 2 });
        }

        function findClosestPoint(points, targetTs) {
            if (!points || points.length === 0) return null;
            let best = points[0];
            let bestDist = Math.abs(points[0].ts - targetTs);
            for (let i = 1; i < points.length; i++) {
                const d = Math.abs(points[i].ts - targetTs);
                if (d < bestDist) {
                    bestDist = d;
                    best = points[i];
                }
            }
            return best;
        }

        function updateKpis(seriesPoints, forecast) {
            const points = Array.isArray(seriesPoints) ? seriesPoints : [];
            if (points.length === 0) {
                kpiLatest.textContent = '—';
                kpiLatestAt.textContent = '—';
                kpiDelta.textContent = '—';
                kpiDelta.title = '';
                kpiDeltaHint.textContent = '—';
                kpiCount.textContent = '0';
                kpiForecast.textContent = forecast && forecast.available ? `预测 ${forecast.predLen}h` : '无预测';
                return;
            }

            const last = points[points.length - 1];
            kpiLatest.textContent = formatNumber(last.price);
            kpiLatestAt.textContent = formatTs(last.ts);
            kpiCount.textContent = String(points.length);

            const dayAgo = last.ts - 24 * 60 * 60 * 1000;
            const ref = findClosestPoint(points, dayAgo);
            if (ref && Number.isFinite(ref.price) && Number.isFinite(last.price) && ref.price !== 0) {
                const diff = last.price - ref.price;
                const pct = (diff / ref.price) * 100;
                const sign = diff > 0 ? '+' : diff < 0 ? '' : '';
                kpiDelta.textContent = `${sign}${formatNumber(diff)} (${sign}${formatNumber(pct)}%)`;
                kpiDelta.title = kpiDelta.textContent;
                kpiDeltaHint.textContent = `对比 ${formatTs(ref.ts)}`;
            } else {
                kpiDelta.textContent = '—';
                kpiDelta.title = '';
                kpiDeltaHint.textContent = '样本不足';
            }

            if (forecast && forecast.available) {
                kpiForecast.textContent = `预测 ${forecast.predLen}h`;
            } else {
                kpiForecast.textContent = '无预测';
            }
        }

        async function refresh() {
            const category = categorySelect.value;
            const bullet = bulletSelect.value;
            const range = rangeSelect.value;
            if (!category || !bullet) return;

            refreshBtn.disabled = true;
            setStatus('加载中…');
            try {
                await ensureChartLib();
                let effectiveRange = range;
                let series = await fetchJson(`/api/series?bullet=${encodeURIComponent(bullet)}&range=${encodeURIComponent(range)}`);
                if (effectiveRange !== 'all' && (!series.points || series.points.length === 0)) {
                    // 数据存在但近 7/30 天为空时，自动回退到全量区间，避免页面看起来“无价格”。
                    effectiveRange = 'all';
                    rangeSelect.value = 'all';
                    series = await fetchJson(`/api/series?bullet=${encodeURIComponent(bullet)}&range=all`);
                }
                let forecast = { available: false, points: [], reason: '' };
                try {
                    forecast = await fetchJson(`/api/forecast?bullet=${encodeURIComponent(bullet)}`);
                } catch (e) {
                    forecast = { available: false, points: [], reason: e.message || '请求失败' };
                }

                const seriesPoints = series.points || [];
                setChart(seriesPoints, (forecast.available ? forecast.points : []));
                metaBadge.textContent = `${series.category || category}`;
                updateKpis(seriesPoints, forecast);
                const rangeLabels = { all: '全部', '3d': '近 3 天', '7d': '近 7 天', '30d': '近 30 天' };
                const rangeText = rangeLabels[effectiveRange] || effectiveRange;
                if (seriesPoints.length === 0) {
                    // 全量区间也无数据：明确告知用户，而不是让空图表自己说话。
                    setStatus(`暂无 ${bullet} 的价格数据（已尝试全部历史区间）`);
                } else if (forecast.available) {
                    setStatus(`范围：${rangeText}；模型：${forecast.modelGroup} / ${forecast.modelId}，预测 ${forecast.predLen} 小时`);
                } else {
                    const reason = forecast.reason || '暂无已训练模型';
                    setStatus(`范围：${rangeText}；${reason}，已仅展示历史数据`);
                }
            } catch (e) {
                setStatus(e.message || '加载失败');
            } finally {
                refreshBtn.disabled = false;
            }
        }

        categorySelect.addEventListener('change', async () => {
            const category = categorySelect.value;
            try {
                await loadBullets(category);
            } catch (e) {
                setStatus(`加载子弹列表失败：${e.message || '请刷新重试'}`);
                return;
            }
            await refresh();
        });
        bulletSelect.addEventListener('change', refresh);
        rangeSelect.addEventListener('change', refresh);
        refreshBtn.addEventListener('click', refresh);

        (async () => {
            try {
                await loadCategories();
                if (categorySelect.options.length > 0) {
                    await loadBullets(categorySelect.value);
                }
                await refresh();
            } catch (e) {
                setStatus(`初始化失败：${e && e.message ? e.message : '未知错误，请刷新页面'}`);
            }
        })();

        const themeToggle = document.getElementById('themeToggle');
        function applyTheme() {
            const root = document.documentElement;
            const current = root.getAttribute('data-theme') || 'light';
            const next = current === 'light' ? 'dark' : 'light';
            root.setAttribute('data-theme', next);
            themeToggle.textContent = next === 'light' ? '🌙' : '☀️';
            themeToggle.title = next === 'light' ? '切换暗色主题' : '切换亮色主题';
            applyChartTheme();
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light' || saved === 'dark') {
                document.documentElement.setAttribute('data-theme', saved);
            }
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            themeToggle.textContent = current === 'light' ? '🌙' : '☀️';
            themeToggle.title = current === 'light' ? '切换暗色主题' : '切换亮色主题';
        })();
        themeToggle.addEventListener('click', () => {
            applyTheme();
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'light' || theme === 'dark') {
                try { localStorage.setItem('theme', theme); } catch {}
            }
        });
    </script>
</body>
</html>
